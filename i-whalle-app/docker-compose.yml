version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: i-whalle-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-i_whalle_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - i-whalle-network

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: i-whalle-backend
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-i_whalle_db}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - backend_node_modules:/app/node_modules
    networks:
      - i-whalle-network
    command: npm run dev

  # Frontend Service (optional, usually run separately during development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: i-whalle-frontend
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
      VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
      VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - frontend_node_modules:/app/node_modules
    networks:
      - i-whalle-network
    command: npm run dev

volumes:
  postgres_data:
    driver: local
  backend_node_modules:
  frontend_node_modules:

networks:
  i-whalle-network:
    driver: bridge
